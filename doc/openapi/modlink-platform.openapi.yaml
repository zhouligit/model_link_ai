components:
  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XOrgId:
      name: X-Org-Id
      in: header
      required: false
      schema:
        type: string
      description: 指定当前组织（合法成员时优先于 JWT 默认 org）
    OrgId:
      name: org_id
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
    KeyId:
      name: key_id
      in: path
      required: true
      schema:
        type: string
    ChannelId:
      name: channel_id
      in: path
      required: true
      schema:
        type: string
    ModelId:
      name: model_id
      in: path
      required: true
      schema:
        type: string

  schemas:
    ApiEnvelope:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
        data: {}
        request_id:
          type: string

    ApiEnvelopePaged:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items: {}
                page:
                  type: integer
                page_size:
                  type: integer
                total:
                  type: integer

    ApiEnvelopeToken:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                user_id:
                  type: string
                access_token:
                  type: string
                refresh_token:
                  type: string
                expires_in:
                  type: integer

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        phone:
          type: string
        password:
          type: string
        invite_code:
          type: string

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        phone:
          type: string
        password:
          type: string
