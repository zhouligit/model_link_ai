services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: modlink_cloud
      MYSQL_USER: modlink
      MYSQL_PASSWORD: modlink
    ports:
      - "3306:3306"
    volumes:
      - modlink_mysql_data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  # Redis 可选；当前后端未强制依赖，可后续启用限流时再接入同一 compose。
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  modlink_mysql_data: {}
