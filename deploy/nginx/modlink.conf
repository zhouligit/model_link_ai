# 容器内 listen 80；宿主机通过 compose 映射为 HTTP_PORT（默认 8100）。
# 使用 Docker 嵌入式 DNS（127.0.0.11）+ 变量 proxy_pass，避免启动时 gateway/platform 尚未就绪
# 导致 “host not found in upstream” 而 Nginx 无限重启。
# 与其它服务共机：主机上另有「整站 Nginx」时，用 host-mlk-proxy.conf 把 ^~ /mlk 转到本端口。

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 20m;

    # 推理网关（含 SSE）
    location ^~ /mlk/v1 {
        set $mlk_gateway http://gateway:8080;
        proxy_pass $mlk_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 平台 API
    location ^~ /mlk/platform/ {
        set $mlk_platform http://platform:8081;
        proxy_pass $mlk_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location = /mlk/health {
        set $mlk_platform http://platform:8081;
        proxy_pass $mlk_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 精确匹配只有无尾斜杠；否则会落到 location /，看起来像「没有 ok」
    location = /mlk/health/ {
        return 308 /mlk/health;
    }

    location / {
        return 200 'ModLink API — use /mlk/v1 and /mlk/platform/v1\n';
        add_header Content-Type text/plain;
    }
}
