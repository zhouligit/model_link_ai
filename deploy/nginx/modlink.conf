# 容器内 listen 80；宿主机通过 compose 映射为 HTTP_PORT（默认 8100）。
# 与其它服务共机：主机上另有「整站 Nginx」时，用 host-mlk-proxy.conf 把 ^~ /mlk 转到本端口。
# 生产请在 server 外再套 listen 443 ssl 与证书路径（可用 certbot / 云证书）

upstream modlink_gateway {
    server gateway:8080;
    keepalive 32;
}

upstream modlink_platform {
    server platform:8081;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # 推理网关（含 SSE；匹配 /mlk/v1 与 /mlk/v1/...）
    location ^~ /mlk/v1 {
        proxy_pass http://modlink_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 平台 API
    location ^~ /mlk/platform/ {
        proxy_pass http://modlink_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # 存活（打到 platform，也可改为 gateway）
    location = /mlk/health {
        proxy_pass http://modlink_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 可选：用户门户 / 管理端静态资源（见 compose profiles）
    # location / { root /var/www/web; try_files $uri $uri/ /index.html; }
    # location /admin { alias /var/www/admin/; try_files $uri $uri/ /admin/index.html; }

    location / {
        return 200 'ModLink API — use /mlk/v1 and /mlk/platform/v1\n';
        add_header Content-Type text/plain;
    }
}
