# 供「整站 Nginx」在共用服务器上 include 使用：只转发路径前缀 /mlk，与旁路业务互不影响。
# 前提：本栈的入口容器将宿主机端口映射为 8100（见 docker-compose.prod.yml 的 HTTP_PORT）。
#
# 在已有 server { listen 80; ... } 内加入一行：
#   include /path/to/modlink-cloud/deploy/nginx/host-mlk-proxy.conf;
#
# 或把下面两个 location 直接粘贴进你的 server 块（注意 proxy_pass 端口与 .env 中 HTTP_PORT 一致）。

location ^~ /mlk {
    proxy_pass http://127.0.0.1:8100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
